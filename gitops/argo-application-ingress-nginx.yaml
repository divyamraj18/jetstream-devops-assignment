apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: "4.15.1"
    helm:
      values: |
        controller:
          hostPort:
            enabled: true
          service:
            # kind has no cloud LoadBalancer provisioner - this would sit in
            # <pending> forever and keep ArgoCD's health check stuck on
            # "Progressing". Traffic reaches the controller via hostPort
            # (wired to kind's 8080->80 port mapping), not this Service.
            type: ClusterIP
          nodeSelector:
            kubernetes.io/os: linux
            ingress-ready: "true"
          tolerations:
            - key: node-role.kubernetes.io/master
              operator: Equal
              effect: NoSchedule
            - key: node-role.kubernetes.io/control-plane
              operator: Equal
              effect: NoSchedule
          watchIngressWithoutClass: true

  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
