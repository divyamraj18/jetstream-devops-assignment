apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jetstream-devops-assignment
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/divyamraj18/jetstream-devops-assignment.git
    targetRevision: master
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
