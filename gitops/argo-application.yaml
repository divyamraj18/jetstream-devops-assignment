apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jetstream-devops-assignment
  namespace: argocd
spec:
  project: default

  sources:
    - repoURL: https://github.com/divyamraj18/jetstream-devops-assignment.git
      targetRevision: master
      path: charts/backend
    - repoURL: https://github.com/divyamraj18/jetstream-devops-assignment.git
      targetRevision: master
      path: charts/mongodb

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  # The HPA (charts/backend/templates/hpa.yaml) manages replica count
  # dynamically. Without this, ArgoCD's selfHeal would fight the autoscaler
  # by forcing spec.replicas back to the chart's static value every sync.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: articles-api
      jsonPointers:
        - /spec/replicas

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
