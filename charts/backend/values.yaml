replicaCount: 3

image:
  repository: divyamdocker1/article-app
  tag: latest
  pullPolicy: Always

service:
  port: 8000

mongo:
  uri: "mongodb://mongodb-0.mongodb-headless:27017,mongodb-1.mongodb-headless:27017,mongodb-2.mongodb-headless:27017/jetstream?replicaSet=rs0"
  dbName: "jetstream"

otel:
  exporterEndpoint: "otel-collector:4317"
  serviceName: "jetstream-articles-api"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

podDisruptionBudget:
  minAvailable: 2
