apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-init-replicaset
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mongo-init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command:
            - bash
            - -c
            - |
              set -e
              for host in {{ range $i := until (int .Values.replicaCount) }}mongodb-{{ $i }}.mongodb-headless {{ end }}; do
                until mongosh --host "$host" --quiet --eval "db.adminCommand('ping')" > /dev/null 2>&1; do
                  echo "waiting for $host..."
                  sleep 3
                done
              done

              already_initiated=$(mongosh --host mongodb-0.mongodb-headless --quiet --eval "rs.status().ok" 2>/dev/null || echo "0")
              if [ "$already_initiated" = "1" ]; then
                echo "replica set already initiated"
                exit 0
              fi

              mongosh --host mongodb-0.mongodb-headless --eval '
                rs.initiate({
                  _id: "{{ .Values.replicaSetName }}",
                  members: [
                    {{- range $i := until (int .Values.replicaCount) }}
                    { _id: {{ $i }}, host: "mongodb-{{ $i }}.mongodb-headless:27017" }{{ if lt (add1 $i) (int $.Values.replicaCount) }},{{ end }}
                    {{- end }}
                  ]
                })
              '
